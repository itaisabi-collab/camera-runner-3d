name: Build Android APK

on:
  workflow_dispatch:  # Manual trigger from GitHub Actions tab
  push:
    branches: [main]
    paths: ['android-app/**', 'index.html']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: android-app
        run: npm ci

      - name: Copy latest web files
        run: |
          cp index.html android-app/www/
          cp manifest.json android-app/www/
          cp sw.js android-app/www/

      - name: Sync Capacitor
        working-directory: android-app
        run: npx cap sync android

      - name: Build Debug APK
        working-directory: android-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RUN3D-debug-apk
          path: android-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release AAB (for Play Store)
        working-directory: android-app/android
        run: ./gradlew bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: RUN3D-release-aab
          path: android-app/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
