<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RUN! 3D - Camera Runner</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;touch-action:none}
        html,body{width:100%;height:100%;overflow:hidden;background:#1a0a30;font-family:'Segoe UI',sans-serif;user-select:none}
        #game{width:100%;height:100%}
        #game canvas{display:block}
        #errBox{position:fixed;top:10px;left:50%;transform:translateX(-50%);color:#f55;background:rgba(20,0,0,.9);padding:12px 20px;border-radius:10px;z-index:100;font-size:.85em;display:none;max-width:90%;text-align:center;border:1px solid #f55}

        /* HUD */
        #hud{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:5;padding:8px 12px;display:none}
        .hb{display:inline-block;margin-right:5px;padding:5px 12px;background:rgba(15,5,40,.8);border-radius:10px;color:#fff;border:1px solid rgba(120,180,255,.2);vertical-align:top;backdrop-filter:blur(6px)}
        .hl{font-size:8px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(150,200,255,.7)}
        .hv{font-size:20px;font-weight:bold;text-shadow:0 0 10px rgba(100,180,255,.5)}
        #hudR{position:fixed;top:8px;right:12px;z-index:5;text-align:right;display:none}
        #ebar{width:100px;height:10px;background:rgba(255,255,255,.08);border-radius:5px;margin-top:4px;overflow:hidden}
        #efill{height:100%;width:100%;background:linear-gradient(90deg,#ff1744,#ff9100,#ffea00,#76ff03,#00e5ff);border-radius:5px;transition:width .3s}
        #comboBox .hv{color:#FFD700;text-shadow:0 0 12px rgba(255,215,0,.6)}

        /* Camera */
        .cam{position:fixed;bottom:10px;left:10px;z-index:10;width:140px;height:105px;border-radius:12px;overflow:hidden;border:2px solid rgba(0,230,200,.35);background:#000}
        @media(max-width:600px){.cam{width:90px;height:68px}}
        .cam video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
        .cam canvas{position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1)}
        #gest{position:fixed;bottom:124px;left:10px;z-index:10;color:#fff;font-size:11px;background:rgba(15,5,40,.65);padding:3px 10px;border-radius:8px;display:none;border:1px solid rgba(0,230,200,.2)}
        @media(max-width:600px){#gest{bottom:84px}}

        /* Overlays */
        .ov{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(10,3,30,.95);color:#fff;text-align:center;padding:20px}
        .ov h1{font-size:2.8em;margin-bottom:10px;background:linear-gradient(135deg,#00e5ff,#e040fb,#ffab40);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 20px rgba(0,229,255,.3))}
        .ov p{font-size:1em;margin:4px 0;max-width:420px;line-height:1.5;color:rgba(200,210,255,.8)}
        .btn{margin-top:16px;padding:14px 48px;font-size:1.2em;border:none;border-radius:40px;color:#fff;cursor:pointer;background:linear-gradient(135deg,#00E5FF,#7C4DFF);box-shadow:0 4px 25px rgba(0,229,255,.3),0 0 40px rgba(124,77,255,.15);font-weight:bold;letter-spacing:1px;transition:transform .15s}
        .btn:hover{transform:scale(1.04)}
        .btn:active{transform:scale(.94)}
        .ig{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0;max-width:340px}
        .ig div{padding:10px;background:rgba(100,180,255,.06);border-radius:12px;font-size:.85em;border:1px solid rgba(100,180,255,.1)}
        .ig span{font-size:1.5em;display:block;margin-bottom:2px}
        .sb{font-size:3.5em;font-weight:bold;background:linear-gradient(135deg,#FFD700,#FFA000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 15px rgba(255,215,0,.4));margin:8px 0}
        .hidden{display:none!important}
        #calOv{display:none}
        #calOv .cd{font-size:6em;font-weight:bold;color:#00E5FF;text-shadow:0 0 30px rgba(0,229,255,.5)}
        #goOv{display:none}
        #loadTxt{margin-top:8px;color:rgba(150,180,255,.6);font-size:.85em}

        /* Floating score popup */
        .score-pop{position:fixed;z-index:15;color:#FFD700;font-weight:bold;font-size:1.3em;pointer-events:none;text-shadow:0 0 10px rgba(255,215,0,.5);animation:popUp .8s ease-out forwards}
        @keyframes popUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
    </style>
</head>
<body>
<div id="errBox"></div>
<div id="game"></div>
<div id="hud">
    <div class="hb"><div class="hl">Score</div><div class="hv" id="hSc">0</div></div>
    <div class="hb"><div class="hl">Level</div><div class="hv" id="hLv">1-1</div></div>
    <div class="hb" id="comboBox" style="display:none"><div class="hl">Combo</div><div class="hv" id="hCo">x1</div></div>
</div>
<div id="hudR">
    <div class="hb"><div class="hl">Energy</div><div id="ebar"><div id="efill"></div></div></div>
    <div class="hb" style="margin-top:4px"><div class="hl">&#x2B50;</div><div class="hv" id="hCn">0</div></div>
</div>
<div class="cam" id="camBox"><video id="vid" autoplay playsinline muted></video><canvas id="poseCvs"></canvas><button id="camSwitch" style="position:absolute;top:3px;right:3px;background:rgba(0,0,0,.6);color:#0fe;border:1px solid #0fe;border-radius:6px;padding:2px 6px;font-size:10px;cursor:pointer;z-index:2" title="Switch camera">&#x1F504;</button></div>
<div id="gest"></div>
<div id="startOv" class="ov">
    <h1>&#x1F3AE; RUN! 3D</h1>
    <p>Control a 3D runner with your body!<br>Camera tracks your movement in real-time</p>
    <div class="ig">
        <div><span>&#x2B05;</span>Lean Left</div><div><span>&#x27A1;</span>Lean Right</div>
        <div><span>&#x1F64C;</span>Arms Up = Jump</div><div><span>&#x1F9CE;</span>Crouch = Duck</div>
    </div>
    <button class="btn" id="startBtn">&#x25B6; PLAY</button>
    <div id="loadTxt">Loading...</div>
    <p style="font-size:.7em;color:rgba(150,160,200,.4);margin-top:6px">Arrows / Swipe also work</p>
</div>
<div id="calOv" class="ov"><p style="font-size:1.3em">&#x1F4F7; Stand in front of camera</p><div class="cd" id="calCD">3</div><p>Stand straight, arms down</p></div>
<div id="goOv" class="ov"><h1>&#x1F4A5; Game Over</h1><div class="sb" id="fSc">0</div><p id="bTxt"></p><button class="btn" id="reBtn">&#x1F504; PLAY AGAIN</button></div>

<script>
window.onerror=function(m,u,l){const e=document.getElementById('errBox');e.style.display='block';e.textContent=m+' (L'+l+')'};
</script>
<script>
async function loadScript(u){return new Promise((r,j)=>{const s=document.createElement('script');s.src=u;s.crossOrigin='anonymous';s.onload=r;s.onerror=j;document.head.appendChild(s)})}
async function boot(){
    const lt=document.getElementById('loadTxt');
    lt.textContent='Loading 3D engine...';
    for(const u of['https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js','https://unpkg.com/three@0.149.0/build/three.min.js']){
        try{await loadScript(u);if(typeof THREE!=='undefined')break}catch(e){}
    }
    if(typeof THREE==='undefined'){lt.textContent='Cannot load 3D engine';lt.style.color='#f55';return}
    lt.textContent='Loading effects...';
    const bloomScripts=['postprocessing/EffectComposer','postprocessing/RenderPass','postprocessing/UnrealBloomPass','postprocessing/ShaderPass','shaders/LuminosityHighPassShader','shaders/CopyShader'];
    window._bloomOK=true;
    for(const s of bloomScripts){try{await loadScript('https://cdn.jsdelivr.net/npm/three@0.149.0/examples/js/'+s+'.js')}catch(e){window._bloomOK=false;break}}
    lt.textContent='Loading pose detection...';
    try{await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js')}catch(e){}
    lt.textContent='Ready!';
    try{initGame()}catch(err){document.getElementById('errBox').style.display='block';document.getElementById('errBox').textContent=err.message;console.error(err)}
}

function initGame(){
const lt=document.getElementById('loadTxt');

// ═══════════════════ CONFIG ═══════════════════
const LW=4,RW=12,RL=350,LX=[-LW,0,LW];
const C={SPD0:0.5,SPD_INC:0.00015,SPD_MAX:2.0,SPAWN_T:1.8,SPAWN_MIN:0.6,
JUMP_D:0.6,DUCK_D:0.5,JUMP_H:5.5,LEAN_T:0.04,JUMP_T:0.055,DUCK_T:0.045,SMOOTH:0.4};

// ═══════════════════ STATE ═══════════════════
const G={st:'menu',score:0,best:+localStorage.getItem('r3B')||0,speed:C.SPD0,time:0,spawnT:0,
obs:[],coins:[],combo:0,mxC:0,nC:0,lv:1,sub:1,energy:100,
pl:{lane:1,tgt:1,disp:1,jump:false,duck:false,jt:0,dt:0,rf:0,y:0},
pose:{ready:false,bx:.5,bShY:.5,bNY:.5,sx:.5,sShY:.5,sNY:.5,slwY:.5,srwY:.5,conf:0},
cal:{samples:[]},camOK:false,particles:[]};

// ═══════════════════ OBJECT POOLS ═══════════════════
const obsPool={0:[],1:[],2:[]};
const coinPool=[];

function getObs(type){
    if(obsPool[type].length>0){const m=obsPool[type].pop();m.visible=true;return m}
    return mkObs(type);
}
function retObs(type,mesh){mesh.visible=false;obsPool[type].push(mesh)}
function getCoin(){
    if(coinPool.length>0){const m=coinPool.pop();m.visible=true;return m}
    return new THREE.Mesh(coinGeo,coinMat);
}
function retCoin(mesh){mesh.visible=false;coinPool.push(mesh)}

// ═══════════════════ RENDERER ═══════════════════
let ren;
try{ren=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'})}
catch(e){lt.textContent='WebGL not supported';return}
ren.setSize(innerWidth,innerHeight);
ren.setPixelRatio(Math.min(devicePixelRatio,2));
ren.shadowMap.enabled=true;
ren.shadowMap.type=THREE.PCFSoftShadowMap;
ren.toneMapping=THREE.ACESFilmicToneMapping;
ren.toneMappingExposure=1.8;
ren.outputColorSpace=THREE.SRGBColorSpace;
document.getElementById('game').appendChild(ren.domElement);

const sc=new THREE.Scene();
sc.background=new THREE.Color(0x5533aa);
sc.fog=new THREE.FogExp2(0x5533aa,0.004);

const cam=new THREE.PerspectiveCamera(72,innerWidth/innerHeight,0.1,500);
cam.position.set(0,7.5,13);cam.lookAt(0,1.5,-30);

// ═══════════════════ BLOOM POST-PROCESSING ═══════════════════
let composer=null,bloomPass=null;
if(window._bloomOK&&THREE.EffectComposer){
    try{
        composer=new THREE.EffectComposer(ren);
        composer.addPass(new THREE.RenderPass(sc,cam));
        bloomPass=new THREE.UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.5,0.4,0.82);
        composer.addPass(bloomPass);
    }catch(e){composer=null;console.log('Bloom failed:',e)}
}

// ═══════════════════ CAMERA EFFECTS ═══════════════════
let shakeIntensity=0;
const baseFOV=72;
function triggerShake(v){shakeIntensity=Math.max(shakeIntensity,v)}

addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight);if(composer)composer.setSize(innerWidth,innerHeight)});

// ═══════════════════ LIGHTS ═══════════════════
sc.add(new THREE.AmbientLight(0xaaaaff,1.5));
sc.add(new THREE.HemisphereLight(0x99bbff,0x553388,1.0));

const sun=new THREE.DirectionalLight(0xffeedd,1.8);
sun.position.set(10,30,15);sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
const sh=sun.shadow.camera;sh.left=-22;sh.right=22;sh.top=28;sh.bottom=-12;sh.near=1;sh.far=60;
sc.add(sun);sc.add(sun.target);

const pLights=[];
const pColors=[0xff44cc,0x44ccff,0xffaa33];
pColors.forEach((c,i)=>{
    const l=new THREE.PointLight(c,5,60);
    l.position.set([-15,15,0][i],[12,12,4][i],[-20,-40,0][i]);
    sc.add(l);pLights.push(l);
});

// ═══════════════════ SKY ═══════════════════
const skyGeo=new THREE.SphereGeometry(200,32,16);
const skyCv=document.createElement('canvas');skyCv.width=4;skyCv.height=512;
const sCtx=skyCv.getContext('2d');
const sG=sCtx.createLinearGradient(0,0,0,512);
sG.addColorStop(0,'#3366cc');sG.addColorStop(0.25,'#6644cc');
sG.addColorStop(0.5,'#8855cc');sG.addColorStop(0.75,'#bb77dd');sG.addColorStop(1,'#eeccff');
sCtx.fillStyle=sG;sCtx.fillRect(0,0,4,512);
sc.add(new THREE.Mesh(skyGeo,new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(skyCv),side:THREE.BackSide})));

// ═══════════════════ ROAD ═══════════════════
function mkRoadTex(){
    const cv=document.createElement('canvas');cv.width=512;cv.height=512;
    const c=cv.getContext('2d');
    c.fillStyle='#2d2060';c.fillRect(0,0,512,512);
    // Vibrant lane colors
    const cols=[['rgba(255,40,160,0.15)',0,170],['rgba(40,160,255,0.15)',170,172],['rgba(255,200,30,0.15)',342,170]];
    cols.forEach(([col,x,w])=>{c.fillStyle=col;c.fillRect(x,0,w,512)});
    // Lane dividers
    c.fillStyle='rgba(255,255,255,0.55)';
    for(let y=0;y<512;y+=56){c.fillRect(168,y,3,28);c.fillRect(340,y,3,28)}
    // Bright edges
    c.fillStyle='rgba(220,100,255,0.85)';c.fillRect(0,0,4,512);c.fillRect(508,0,4,512);
    // Center glow lines
    c.fillStyle='rgba(100,200,255,0.1)';
    c.fillRect(253,0,6,512);
    const t=new THREE.CanvasTexture(cv);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(1,55);return t;
}
const roadTex=mkRoadTex();
const road=new THREE.Mesh(new THREE.PlaneGeometry(RW,RL),
    new THREE.MeshStandardMaterial({map:roadTex,roughness:0.35,metalness:0.35}));
road.rotation.x=-Math.PI/2;road.position.set(0,0,-RL/2+20);road.receiveShadow=true;sc.add(road);

// Ground
const gnd=new THREE.Mesh(new THREE.PlaneGeometry(500,600),
    new THREE.MeshStandardMaterial({color:0x1a0d40,roughness:0.9}));
gnd.rotation.x=-Math.PI/2;gnd.position.set(0,-0.05,-150);gnd.receiveShadow=true;sc.add(gnd);

// Neon edges (cylinder for roundness)
const edgeMat=new THREE.MeshBasicMaterial({color:0xff44dd});
for(const x of[-RW/2,RW/2]){
    const e=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,RL,6),edgeMat);
    e.rotation.x=Math.PI/2;e.position.set(x,0.08,-RL/2+20);sc.add(e);
}

// ═══════════════════ ENVIRONMENT ═══════════════════
// Glowing posts
const postMat=new THREE.MeshStandardMaterial({color:0x7755bb,metalness:0.8,roughness:0.2});
const bulbCols=[0x00ffcc,0xff44cc,0x44ccff,0xffaa00,0xff66ee,0x44ffaa];
for(let i=0;i<35;i++){
    const z=-i*9+15,side=i%2?-1:1,x=side*(RW/2+2.5);
    const post=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.12,5.5,6),postMat);
    post.position.set(x,2.75,z);sc.add(post);
    const bc=bulbCols[i%bulbCols.length];
    const bulb=new THREE.Mesh(new THREE.SphereGeometry(0.45,10,10),
        new THREE.MeshBasicMaterial({color:bc}));
    bulb.position.set(x,5.8,z);sc.add(bulb);
    if(i%3===0){const pl=new THREE.PointLight(bc,0.8,16);pl.position.set(x,5.2,z);sc.add(pl)}
}

// Crystal trees
const tCols=[0x00e5ff,0x7c4dff,0x00bfa5,0xe040fb,0x40c4ff,0xffab40];
for(let i=0;i<45;i++){
    const side=i%2?-1:1,z=-i*6.5+20+Math.random()*3;
    const x=side*(RW/2+3.5+Math.random()*9);
    // Trunk
    const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.2,2.2,5),
        new THREE.MeshStandardMaterial({color:0x553388,roughness:0.5}));
    trunk.position.set(x,1.1,z);sc.add(trunk);
    // Crown (sphere)
    const tc=tCols[i%tCols.length];
    const crown=new THREE.Mesh(new THREE.SphereGeometry(1.5+Math.random(),10,10),
        new THREE.MeshStandardMaterial({color:tc,roughness:0.25,metalness:0.5,emissive:tc,emissiveIntensity:0.2}));
    crown.position.set(x,3.5+Math.random()*1.5,z);
    crown.scale.set(0.7+Math.random()*0.4,0.9+Math.random()*0.5,0.7+Math.random()*0.4);
    sc.add(crown);
}

// Buildings (cylindrical, glowing)
const bCols=[0xff3cac,0x00b4d8,0x845ec2,0xff6f91,0x00c9a7,0xffc75f,0xd65db1];
for(let i=0;i<30;i++){
    const side=i%2?-1:1;
    const h=8+Math.random()*35,r=1.5+Math.random()*3;
    const z=-i*10+30,x=side*(RW/2+9+Math.random()*12);
    const col=bCols[i%bCols.length];
    const bld=new THREE.Mesh(new THREE.CylinderGeometry(r,r+0.5,h,10),
        new THREE.MeshStandardMaterial({color:0x150a30,roughness:0.7}));
    bld.position.set(x,h/2,z);bld.castShadow=true;sc.add(bld);
    // Glowing dome
    const dome=new THREE.Mesh(new THREE.SphereGeometry(r+0.2,10,6,0,Math.PI*2,0,Math.PI/2),
        new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.65}));
    dome.position.set(x,h,z);sc.add(dome);
    // Neon rings
    for(let ring=0;ring<2;ring++){
        const rr=new THREE.Mesh(new THREE.TorusGeometry(r+0.2,0.08,6,18),
            new THREE.MeshBasicMaterial({color:col}));
        rr.position.set(x,h*(0.35+ring*0.3),z);rr.rotation.x=Math.PI/2;sc.add(rr);
    }
}

// ═══════════════════ CHARACTER ═══════════════════
function mkChar(){
    const g=new THREE.Group();
    const skin=new THREE.MeshStandardMaterial({color:0xffccaa,roughness:0.55});
    const shirt=new THREE.MeshStandardMaterial({color:0x4488ff,roughness:0.3,metalness:0.25,emissive:0x2244cc,emissiveIntensity:0.2});
    const pants=new THREE.MeshStandardMaterial({color:0x2a2060,roughness:0.45});
    const shoeMat=new THREE.MeshStandardMaterial({color:0x00ff88,roughness:0.25,emissive:0x00ff88,emissiveIntensity:0.7});
    const hairM=new THREE.MeshStandardMaterial({color:0x221144,roughness:0.8});

    // Body capsule
    const body=new THREE.Mesh(new THREE.CapsuleGeometry(0.6,0.9,8,12),shirt);
    body.position.y=2.5;body.castShadow=true;g.add(body);g.bodyM=body;
    // Head
    const head=new THREE.Mesh(new THREE.SphereGeometry(0.6,20,20),skin);
    head.position.y=4;head.castShadow=true;g.add(head);
    // Hair
    const hair=new THREE.Mesh(new THREE.SphereGeometry(0.64,14,8,0,Math.PI*2,0,Math.PI*.48),hairM);
    hair.position.y=4.08;g.add(hair);
    // Eyes
    const eW=new THREE.MeshBasicMaterial({color:0xffffff});
    const eP=new THREE.MeshBasicMaterial({color:0x111122});
    for(const ex of[-.22,.22]){
        const eye=new THREE.Mesh(new THREE.SphereGeometry(.12,8,8),eW);eye.position.set(ex,4,.52);g.add(eye);
        const pup=new THREE.Mesh(new THREE.SphereGeometry(.06,8,8),eP);pup.position.set(ex,3.99,.6);g.add(pup);
    }
    // Smile
    const smile=new THREE.Mesh(new THREE.TorusGeometry(0.15,0.03,6,10,Math.PI),
        new THREE.MeshBasicMaterial({color:0xff4466}));
    smile.position.set(0,3.75,.55);smile.rotation.x=0.15;g.add(smile);
    // Limbs
    function limb(x,y,r,h,mat){
        const gr=new THREE.Group();gr.position.set(x,y,0);
        const m=new THREE.Mesh(new THREE.CapsuleGeometry(r,h-r*2,5,8),mat);
        m.position.y=-h/2;m.castShadow=true;gr.add(m);return gr;
    }
    g.lA=limb(-1,3.2,.16,.95,skin);g.rA=limb(1,3.2,.16,.95,skin);
    g.lL=limb(-.36,1.45,.18,1.2,pants);g.rL=limb(.36,1.45,.18,1.2,pants);
    [g.lA,g.rA,g.lL,g.rL].forEach(l=>g.add(l));
    // Shoes
    const sG=new THREE.SphereGeometry(0.26,8,6);
    const ls=new THREE.Mesh(sG,shoeMat);ls.position.set(0,-.72,.1);g.lL.add(ls);
    const rs=new THREE.Mesh(sG,shoeMat);rs.position.set(0,-.72,.1);g.rL.add(rs);
    return g;
}
const chr=mkChar();sc.add(chr);
const chSh=new THREE.Mesh(new THREE.CircleGeometry(1,16),
    new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:0.2}));
chSh.rotation.x=-Math.PI/2;chSh.position.y=0.02;sc.add(chSh);

// Speed trail particles behind character
const trailGeo=new THREE.BufferGeometry();
const trailCount=60;
const trailPos=new Float32Array(trailCount*3);
const trailAlpha=new Float32Array(trailCount);
trailGeo.setAttribute('position',new THREE.BufferAttribute(trailPos,3));
const trailMat=new THREE.PointsMaterial({color:0x44ccff,size:0.3,transparent:true,opacity:0.4,blending:THREE.AdditiveBlending});
const trail=new THREE.Points(trailGeo,trailMat);
sc.add(trail);

function mkObs(type){

        const rP=new THREE.Mesh(pGeo,oMat.gate);rP.position.set(RW/2-1,3.25,0);rP.castShadow=true;g.add(rP);

// ═══════════════════ MUSIC ═══════════════════
let audioCtx,musicPlaying=false,musicTimeout;
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}

function startMusic(){
    if(musicPlaying)return;musicPlaying=true;
    const ac=getAC(),master=ac.createGain();
    master.gain.value=0.1;master.connect(ac.destination);
    const melody=[523,659,784,880,784,659,523,659,587,698,880,1047,880,698,587,698,
                  523,784,659,880,523,784,1047,880,698,880,784,659,523,587,659,523];
    const bass=[131,131,165,165,175,175,131,131,147,147,175,175,196,196,147,147,
                131,131,165,165,175,175,196,196,175,175,165,165,131,131,147,147];
    const bpm=145,nLen=60/bpm;
    let t0=ac.currentTime+0.1;
    function sched(){
        if(!musicPlaying)return;
        for(let i=0;i<melody.length;i++){
            const t=t0+i*nLen;
            // Melody
            const o1=ac.createOscillator(),g1=ac.createGain();
            o1.type='sine';o1.frequency.value=melody[i];
            g1.gain.setValueAtTime(0.12,t);g1.gain.exponentialRampToValueAtTime(0.001,t+nLen*.85);
            o1.connect(g1);g1.connect(master);o1.start(t);o1.stop(t+nLen);
            // Harmony
            const o2=ac.createOscillator(),g2=ac.createGain();
            o2.type='triangle';o2.frequency.value=melody[i]*1.26;
            g2.gain.setValueAtTime(0.05,t);g2.gain.exponentialRampToValueAtTime(0.001,t+nLen*.75);
            o2.connect(g2);g2.connect(master);o2.start(t);o2.stop(t+nLen);
            // Bass
            const o3=ac.createOscillator(),g3=ac.createGain();
            o3.type='sine';o3.frequency.value=bass[i%bass.length];
            g3.gain.setValueAtTime(0.1,t);g3.gain.exponentialRampToValueAtTime(0.005,t+nLen*.9);
            o3.connect(g3);g3.connect(master);o3.start(t);o3.stop(t+nLen);
            // Percussion
            if(i%2===0){
                const buf=ac.createBuffer(1,ac.sampleRate*0.025,ac.sampleRate);
                const d=buf.getChannelData(0);for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1)*.25;
                const n=ac.createBufferSource();n.buffer=buf;
                const ng=ac.createGain();ng.gain.setValueAtTime(0.06,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.04);
                n.connect(ng);ng.connect(master);n.start(t);
            }
        }
        t0+=melody.length*nLen;
        musicTimeout=setTimeout(sched,(melody.length*nLen*1000)*0.5);
    }
    sched();
}
function stopMusic(){musicPlaying=false;clearTimeout(musicTimeout)}

function sfx(f,d,t,v){try{const a=getAC(),o=a.createOscillator(),g=a.createGain();o.type=t||'square';o.frequency.value=f;g.gain.value=v||.06;g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+d)}catch(e){}}
function sfxCoin(){sfx(880,.07,'sine',.05);setTimeout(()=>sfx(1320,.05,'sine',.04),35)}
function sfxJump(){sfx(523,.08,'sine',.04);sfx(784,.08,'sine',.03)}
function sfxHit(){sfx(110,.35,'sawtooth',.08);sfx(80,.4,'sine',.06)}

// ═══════════════════ MEDIAPIPE ═══════════════════
const vid=document.getElementById('vid'),pCvs=document.getElementById('poseCvs'),pCtx=pCvs.getContext('2d'),gestEl=document.getElementById('gest');
const SK=[[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28]];
let pDet=null;
let allCameras=[],currentCamIdx=0;

async function startCamera(deviceId){
    // Stop old stream
    if(vid.srcObject){vid.srcObject.getTracks().forEach(t=>t.stop())}
    const constraints={video:{width:{ideal:640},height:{ideal:480}}};
    if(deviceId)constraints.video.deviceId={exact:deviceId};
    else constraints.video.facingMode='user';
    const stream=await navigator.mediaDevices.getUserMedia(constraints);
    vid.srcObject=stream;await vid.play();
    // Get camera name
    const track=stream.getVideoTracks()[0];
    gestEl.textContent='Camera: '+track.label.substring(0,25);
}

async function switchCamera(){
    if(allCameras.length<2)return;
    currentCamIdx=(currentCamIdx+1)%allCameras.length;
    gestEl.textContent='Switching...';
    try{await startCamera(allCameras[currentCamIdx].deviceId)}
    catch(e){gestEl.textContent='Switch failed'}
}

async function initPose(){
    gestEl.style.display='block';
    gestEl.textContent='Requesting camera...';
    // Request camera
    try{
        await startCamera(null);
        G.camOK=true;
        const box=document.getElementById('camBox');pCvs.width=box.clientWidth;pCvs.height=box.clientHeight;
        // Enumerate all cameras for switching
        const devices=await navigator.mediaDevices.enumerateDevices();
        allCameras=devices.filter(d=>d.kind==='videoinput');
        if(allCameras.length>1){
            document.getElementById('camSwitch').style.display='block';
            gestEl.textContent='Camera OK! ('+allCameras.length+' found, click 🔄)';
        }else{
            document.getElementById('camSwitch').style.display='none';
            gestEl.textContent='Camera OK!';
        }
    }catch(e){
        console.log('Camera error:',e);
        gestEl.textContent='No camera: use arrows/swipe';
        gestEl.style.color='#f88';
        document.getElementById('camBox').style.display='none';
        return;
    }
    // Pose detection
    if(typeof Pose==='undefined'){gestEl.textContent+=' (no body tracking)';return}
    gestEl.textContent='Loading body tracking...';
    try{
        pDet=new Pose({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
        pDet.setOptions({modelComplexity:0,smoothLandmarks:true,enableSegmentation:false,minDetectionConfidence:.5,minTrackingConfidence:.5});
        pDet.onResults(onPR);
        if(vid.readyState>=2){try{await pDet.send({image:vid})}catch(e){}}
        gestEl.textContent='Body tracking ready!';
        (async function lp(){if(pDet&&vid.readyState>=2)try{await pDet.send({image:vid})}catch(e){}requestAnimationFrame(lp)})();
    }catch(e){gestEl.textContent='Tracking failed: use arrows/swipe'}
}
document.getElementById('camSwitch').addEventListener('click',e=>{e.stopPropagation();switchCamera()});
function onPR(r){
    if(!r.poseLandmarks){G.pose.ready=false;return}
    const lm=r.poseLandmarks,p=G.pose;
    const sx=(lm[11].x+lm[12].x)/2,sy=(lm[11].y+lm[12].y)/2;
    p.conf=Math.min(lm[11].visibility||0,lm[12].visibility||0);p.ready=p.conf>.4;
    const a=C.SMOOTH;
    p.sx=p.sx*(1-a)+sx*a;p.sShY=p.sShY*(1-a)+sy*a;p.sNY=p.sNY*(1-a)+lm[0].y*a;
    p.slwY=p.slwY*(1-a)+lm[15].y*a;p.srwY=p.srwY*(1-a)+lm[16].y*a;
    const w=pCvs.width,h=pCvs.height;pCtx.clearRect(0,0,w,h);
    pCtx.strokeStyle='rgba(0,255,180,.6)';pCtx.lineWidth=2;
    SK.forEach(([a,b])=>{if((lm[a].visibility||0)>.3&&(lm[b].visibility||0)>.3){pCtx.beginPath();pCtx.moveTo(lm[a].x*w,lm[a].y*h);pCtx.lineTo(lm[b].x*w,lm[b].y*h);pCtx.stroke()}});
    if(G.st==='cal')G.cal.samples.push({x:sx,shY:sy,nY:lm[0].y,lwY:lm[15].y,rwY:lm[16].y});
}
function detectG(){
    const p=G.pose,pl=G.pl;if(!p.ready)return;
    const lean=p.sx-p.bx;
    if(lean>C.LEAN_T)pl.tgt=0;else if(lean<-C.LEAN_T)pl.tgt=2;else pl.tgt=1;
    if(p.bShY-p.slwY>C.JUMP_T&&p.bShY-p.srwY>C.JUMP_T&&!pl.jump&&!pl.duck){pl.jump=true;pl.jt=C.JUMP_D;sfxJump()}
    if(p.sNY-p.bNY>C.DUCK_T&&!pl.jump&&!pl.duck){pl.duck=true;pl.dt=C.DUCK_D}
    let t='center';
    if(pl.jump)t='JUMP!';else if(pl.duck)t='DUCK!';
    else if(pl.tgt===0)t='LEFT';else if(pl.tgt===2)t='RIGHT';
    gestEl.textContent=t;
}

// ═══════════════════ UPDATE ═══════════════════
let lastT=performance.now();
function update(dt){
    if(G.st!=='playing')return;
    G.time+=dt;G.score+=(1+G.speed*14)*dt;
    G.speed=Math.min(C.SPD_MAX,C.SPD0+G.time*C.SPD_INC);
    G.lv=Math.floor(G.score/3000)+1;G.sub=Math.floor((G.score%3000)/600)+1;
    G.energy=Math.max(0,G.energy-dt*.3);
    if(G.energy<=0){gameOver();return}
    roadTex.offset.y-=G.speed*dt*2.5;
    if(G.camOK)detectG();
    const pl=G.pl,tx=LX[pl.tgt];
    chr.position.x+=(tx-chr.position.x)*Math.min(1,dt*11);
    pl.disp+=(pl.tgt-pl.disp)*Math.min(1,dt*12);
    if(pl.jump){pl.jt-=dt;pl.y=Math.sin((1-pl.jt/C.JUMP_D)*Math.PI)*C.JUMP_H;if(pl.jt<=0){pl.jump=false;pl.y=0}}
    if(pl.duck){pl.dt-=dt;if(pl.dt<=0)pl.duck=false}
    chr.position.y=pl.y;chr.scale.y=pl.duck?.5:1;
    if(pl.duck)chr.position.y=-.8;
    // Run animation
    pl.rf+=dt*(6+G.speed*3.5);
    const r=pl.rf;
    chr.lA.rotation.x=Math.sin(r+Math.PI)*.9;chr.rA.rotation.x=Math.sin(r)*.9;
    chr.lL.rotation.x=Math.sin(r)*1.1;chr.rL.rotation.x=Math.sin(r+Math.PI)*1.1;
    chr.bodyM.position.y=2.5+Math.abs(Math.sin(r*2))*.15;
    chSh.position.x=chr.position.x;chSh.scale.setScalar(pl.jump?.35:1);
    // Camera
    cam.position.x+=(chr.position.x*.35-cam.position.x)*Math.min(1,dt*6);
    cam.lookAt(chr.position.x*.3,1.5,-28);
    sun.target.position.set(chr.position.x,0,-5);

    // Speed trail
    for(let i=0;i<trailCount;i++){
        const ii=i*3;
        trailPos[ii]=chr.position.x+(Math.random()-.5)*2;
        trailPos[ii+1]=Math.random()*3;
        trailPos[ii+2]=chr.position.z+1+Math.random()*G.speed*20;
    }
    trailGeo.attributes.position.needsUpdate=true;
    trail.material.opacity=Math.min(0.5,G.speed*0.3);

    const spd=G.speed*dt*60;

    // Obstacles
    for(let i=G.obs.length-1;i>=0;i--){
        const o=G.obs[i];o.mesh.position.z+=spd;
        if(!o.passed&&Math.abs(o.mesh.position.z)<2){
            const pL=Math.round(pl.disp);let hit=false;
            if(o.type===OT.BLK)hit=o.lanes.includes(pL)&&!pl.jump;
            else if(o.type===OT.LOW)hit=!pl.jump;
            else hit=!pl.duck;
            if(hit){gameOver();return}
            o.passed=true;
        }
        if(o.mesh.position.z>25){sc.remove(o.mesh);retObs(o.type,o.mesh);G.obs.splice(i,1);if(!o.passed)G.score+=30}
    }
    // Coins
    for(let i=G.coins.length-1;i>=0;i--){
        const c=G.coins[i];c.mesh.position.z+=spd;
        c.mesh.rotation.y+=dt*5;c.mesh.position.y=1.5+Math.sin(G.time*4+i)*.4;
        if(!c.col&&Math.abs(c.mesh.position.z)<2.2){
            if(Math.round(pl.disp)===c.lane){
                c.col=true;sc.remove(c.mesh);retCoin(c.mesh);G.coins.splice(i,1);
                G.combo++;G.mxC=Math.max(G.mxC,G.combo);G.nC++;
                const pts=50*G.combo;G.score+=pts;G.energy=Math.min(100,G.energy+5);
                sfxCoin();
                spawnParts(c.mesh.position.x,c.mesh.position.y,c.mesh.position.z,0xFFD700,8);
                showScorePop('+'+pts,innerWidth/2,innerHeight/2-50);
                continue;
            }
        }
        if(c.mesh.position.z>25){sc.remove(c.mesh);retCoin(c.mesh);G.coins.splice(i,1);G.combo=0}
    }

    // Particles
    for(let i=G.particles.length-1;i>=0;i--){
        const p=G.particles[i];
        p.x+=p.vx*dt;p.y+=p.vy*dt;p.z+=p.vz*dt;p.vy-=9*dt;p.life-=dt;
        if(p.life<=0)G.particles.splice(i,1);
    }
    // Update particle buffer
    for(let i=0;i<MAX_PARTS;i++){
        const ii=i*3;
        if(i<G.particles.length){
            const p=G.particles[i];
            partPositions[ii]=p.x;partPositions[ii+1]=p.y;partPositions[ii+2]=p.z;
            partColors[ii]=p.r;partColors[ii+1]=p.g;partColors[ii+2]=p.b;
        }else{
            partPositions[ii]=0;partPositions[ii+1]=-100;partPositions[ii+2]=0;
        }
    }
    partGeo.attributes.position.needsUpdate=true;
    partGeo.attributes.color.needsUpdate=true;

    // Spawn
    G.spawnT-=dt;
    if(G.spawnT<=0){
        G.spawnT=Math.max(C.SPAWN_MIN,C.SPAWN_T-G.time*.012);
        const rr=Math.random();let type,lanes;
        if(rr<.45){type=OT.BLK;const l=Math.floor(Math.random()*3);lanes=Math.random()<.22&&G.score>1000?[l,(l+(Math.random()<.5?1:2))%3]:[l]}
        else if(rr<.7){type=OT.LOW;lanes=[0,1,2]}
        else{type=OT.HIGH;lanes=[0,1,2]}
        if(type===OT.BLK){
            lanes.forEach(l=>{const m=getObs(OT.BLK);m.position.set(LX[l],0,-RL*.7);sc.add(m);G.obs.push({type:OT.BLK,lanes:[l],mesh:m,passed:false})});
        }else{const m=getObs(type);m.position.set(0,0,-RL*.7);sc.add(m);G.obs.push({type,lanes,mesh:m,passed:false})}
    }
    // Coins
    if(Math.random()<dt*2){
        const l=Math.floor(Math.random()*3),m=getCoin();
        m.position.set(LX[l],1.5,-RL*.6-Math.random()*20);sc.add(m);G.coins.push({lane:l,mesh:m,col:false});
    }
    // Animate atmosphere lights
    pLights[0].position.z=-15+Math.sin(G.time*.5)*12;
    pLights[1].position.z=-35+Math.cos(G.time*.3)*12;

    // HUD
    document.getElementById('hSc').textContent=Math.floor(G.score).toLocaleString();
    document.getElementById('hLv').textContent=G.lv+'-'+G.sub;
    document.getElementById('efill').style.width=G.energy+'%';
    document.getElementById('hCn').textContent=G.nC;
    if(G.combo>1){document.getElementById('comboBox').style.display='';document.getElementById('hCo').textContent='x'+G.combo}
    else document.getElementById('comboBox').style.display='none';
}

// ═══════════════════ FLOW ═══════════════════
function startGame(){
    try{getAC().resume()}catch(e){}
    document.getElementById('startOv').classList.add('hidden');
    try{startMusic()}catch(e){}
    if(G.camOK){
        document.getElementById('calOv').style.display='flex';gestEl.style.display='block';
        G.st='cal';G.cal.samples=[];let c=3;document.getElementById('calCD').textContent='3';
        const t=setInterval(()=>{c--;document.getElementById('calCD').textContent=c;if(c<=0){clearInterval(t);finCal()}},1e3);
    }else beginPlay();
}
function finCal(){
    const s=G.cal.samples;if(s.length>3){
        const av=fn=>s.reduce((a,p)=>a+fn(p),0)/s.length;
        G.pose.bx=av(p=>p.x);G.pose.bShY=av(p=>p.shY);G.pose.bNY=av(p=>p.nY);
        G.pose.sx=G.pose.bx;G.pose.sShY=G.pose.bShY;G.pose.sNY=G.pose.bNY;
        G.pose.slwY=av(p=>p.lwY);G.pose.srwY=av(p=>p.rwY);
    }
    document.getElementById('calOv').style.display='none';beginPlay();
}
function beginPlay(){
    G.st='playing';G.score=0;G.speed=C.SPD0;G.time=0;G.spawnT=0;
    G.combo=0;G.mxC=0;G.nC=0;G.lv=1;G.sub=1;G.energy=100;G.particles=[];
    G.pl={lane:1,tgt:1,disp:1,jump:false,duck:false,jt:0,dt:0,rf:0,y:0};
    G.obs.forEach(o=>{sc.remove(o.mesh);retObs(o.type,o.mesh)});
    G.coins.forEach(c=>{sc.remove(c.mesh);retCoin(c.mesh)});
    G.obs=[];G.coins=[];
    chr.position.set(0,0,0);chr.scale.y=1;
    document.getElementById('hud').style.display='';document.getElementById('hudR').style.display='';
}
function gameOver(){
    G.st='over';sfxHit();stopMusic();
    spawnParts(chr.position.x,3,0,0xff2244,20);
    spawnParts(chr.position.x,3,0,0xffaa00,12);
    const s=Math.floor(G.score);if(s>G.best){G.best=s;localStorage.setItem('r3B',s)}
    document.getElementById('fSc').textContent=s.toLocaleString();
    document.getElementById('bTxt').innerHTML='Best: '+G.best.toLocaleString()+'<br>&#x2B50; '+G.nC+' | Max Combo: x'+G.mxC;
    document.getElementById('hud').style.display='none';document.getElementById('hudR').style.display='none';
    setTimeout(()=>document.getElementById('goOv').style.display='flex',400);
}

// ═══════════════════ LOOP ═══════════════════
function loop(){
    const now=performance.now(),dt=Math.min(.05,(now-lastT)/1e3);lastT=now;
    update(dt);ren.render(sc,cam);requestAnimationFrame(loop);
}

// ═══════════════════ INPUT ═══════════════════
addEventListener('keydown',e=>{
    if(G.st!=='playing')return;const p=G.pl;
    switch(e.key){
        case'ArrowLeft':p.tgt=Math.max(0,p.tgt-1);e.preventDefault();break;
        case'ArrowRight':p.tgt=Math.min(2,p.tgt+1);e.preventDefault();break;
        case'ArrowUp':case' ':if(!p.jump&&!p.duck){p.jump=true;p.jt=C.JUMP_D;sfxJump()}e.preventDefault();break;
        case'ArrowDown':if(!p.jump&&!p.duck){p.duck=true;p.dt=C.DUCK_D}e.preventDefault();break;
    }
});
let tX=0,tY=0,tT=0;
addEventListener('touchstart',e=>{if(e.target.closest('.btn,.ov'))return;tX=e.touches[0].clientX;tY=e.touches[0].clientY;tT=Date.now()},{passive:true});
addEventListener('touchend',e=>{
    if(G.st!=='playing'||e.target.closest('.btn,.ov'))return;
    const dx=e.changedTouches[0].clientX-tX,dy=e.changedTouches[0].clientY-tY;
    if(Date.now()-tT>500)return;const p=G.pl;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>25){if(dx>0)p.tgt=Math.min(2,p.tgt+1);else p.tgt=Math.max(0,p.tgt-1)}
    else if(Math.abs(dy)>25){if(dy<0&&!p.jump&&!p.duck){p.jump=true;p.jt=C.JUMP_D;sfxJump()}else if(dy>0&&!p.jump&&!p.duck){p.duck=true;p.dt=C.DUCK_D}}
},{passive:true});
